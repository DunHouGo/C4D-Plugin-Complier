name: Manual Test Build

on:
  workflow_dispatch:
    inputs:
      bundle:
        description: 'Create installer bundles instead of a no-bundle smoke build'
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-build:
    name: ${{ matrix.name }} test build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            rust-targets: ''
            build-args: ''
            bundle-args: --bundles msi,nsis
            plain-binary: src-tauri/target/release/c4d-plugin-compiler.exe
            bundle-paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/**/*.sig
            artifact-prefix: c4d-plugin-compiler-windows
          - name: macOS
            runner: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            build-args: --target universal-apple-darwin
            bundle-args: --target universal-apple-darwin --bundles dmg,app
            plain-binary: src-tauri/target/universal-apple-darwin/release/c4d-plugin-compiler
            bundle-paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
              src-tauri/target/universal-apple-darwin/release/bundle/**/*.tar.gz
              src-tauri/target/universal-apple-darwin/release/bundle/**/*.sig
            artifact-prefix: c4d-plugin-compiler-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.runner }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm exec -- vp exec tsc --noEmit

      - name: Build frontend
        run: npm exec -- vp build

      - name: Build Tauri app without bundles
        if: ${{ !inputs.bundle }}
        run: npm exec -- tauri build ${{ matrix.build-args }} --no-bundle

      - name: Build Tauri app with bundles
        if: ${{ inputs.bundle }}
        run: npm exec -- tauri build ${{ matrix.bundle-args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload no-bundle app binary
        if: ${{ !inputs.bundle }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-prefix }}-binary
          path: ${{ matrix.plain-binary }}
          if-no-files-found: error

      - name: Upload installer bundles
        if: ${{ inputs.bundle }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-prefix }}-bundles
          path: ${{ matrix.bundle-paths }}
          if-no-files-found: error
