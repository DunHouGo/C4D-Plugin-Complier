name: Manual Test Build

on:
  workflow_dispatch:
    inputs:
      bundle:
        description: 'Create installer bundles instead of a no-bundle smoke build'
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  windows-build:
    name: Windows test build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm exec -- vp exec tsc --noEmit

      - name: Build frontend
        run: npm exec -- vp build

      - name: Build Tauri app without bundles
        if: ${{ !inputs.bundle }}
        run: npm exec -- tauri build --no-bundle

      - name: Build Tauri app with bundles
        if: ${{ inputs.bundle }}
        run: npm exec -- tauri build --bundles msi,nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload no-bundle executable
        if: ${{ !inputs.bundle }}
        uses: actions/upload-artifact@v4
        with:
          name: c4d-plugin-compiler-windows-exe
          path: src-tauri/target/release/c4d-plugin-compiler.exe
          if-no-files-found: error

      - name: Upload installer bundles
        if: ${{ inputs.bundle }}
        uses: actions/upload-artifact@v4
        with:
          name: c4d-plugin-compiler-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: c4d-plugin-compiler-frontend-dist
          path: dist
          if-no-files-found: error
