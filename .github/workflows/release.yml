name: Release C4D Plugin Compiler

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-tauri:
    name: Build Windows release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: vpr typecheck

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release.outputs.version }}
          releaseName: 'C4D Plugin Compiler ${{ steps.release.outputs.version }}'
          releaseBody: |
            ## C4D Plugin Compiler ${{ steps.release.outputs.version }}

            ### Windows Installation
            Download the `.msi` or `.exe` installer from this release and run it.

            ### Auto Updates
            This release includes signed updater artifacts and `latest.json` for the in-app updater.

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ steps.release.outputs.version }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --bundles msi,nsis
