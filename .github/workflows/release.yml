name: Release C4D Plugin Compiler

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }} release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            rust-targets: ''
            tauri-args: --bundles msi,nsis
          - name: macOS
            runner: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin --bundles dmg,app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.runner }}

      - name: Install dependencies
        run: npm ci

      - name: Sync app version from release tag
        run: npm exec -- vp exec node scripts/prepare-release.js ${{ github.ref_name }} --skip-checks --skip-install

      - name: Verify release version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "Release tag version: ${TAG_VERSION}"
          echo "Tauri app version: ${APP_VERSION}"
          test "${APP_VERSION}" = "${TAG_VERSION}"

      - name: Typecheck frontend
        run: npm exec -- vp exec tsc --noEmit

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'C4D Plugin Compiler ${{ github.ref_name }}'
          releaseBody: |
            ## C4D Plugin Compiler ${{ github.ref_name }}

            ### Installation
            - Windows: download the `.msi` or `.exe` installer from this release and run it.
            - macOS: download the `.dmg` image from this release and drag the app to Applications.

            ### Auto Updates
            This release includes signed updater artifacts and `latest.json` for the in-app updater.

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tauriScript: npm run tauri
          args: ${{ matrix.tauri-args }}
