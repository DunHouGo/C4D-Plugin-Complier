name: Release C4D Plugin Compiler

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }} release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            rust-targets: ''
            tauri-args: --bundles msi,nsis
          - name: macOS
            runner: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin --bundles dmg,app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.runner }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm exec -- vp exec tsc --noEmit

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'C4D Plugin Compiler ${{ github.ref_name }}'
          releaseBody: |
            ## C4D Plugin Compiler ${{ github.ref_name }}

            ### Windows Installation
            Download the `.msi` or `.exe` installer from this release and run it.

            ### Auto Updates
            This release includes signed updater artifacts and `latest.json` for the in-app updater.

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          tauriScript: npm exec -- tauri
          args: ${{ matrix.tauri-args }}
